name: Auto Footprint Cloud

on:
  schedule:
    # 10:30 Ecuador time = 15:30 UTC
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-footprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate public-safe footprint content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          FOOTPRINT_BLOCKED_TERMS: ${{ secrets.FOOTPRINT_BLOCKED_TERMS }}
        run: python automation/auto_footprint_cloud.py

      - name: Commit and publish changes
        run: |
          git config user.name "auto-footprint-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs posts social products portfolio automation/state || true
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "auto-footprint: publish daily public-safe content"
            git push
          fi
