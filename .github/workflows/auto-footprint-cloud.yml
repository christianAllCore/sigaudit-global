name: Auto Footprint Cloud
# Manual trigger from ChatGPT: 2026-05-25

on:
  push:
    branches:
      - main
    paths:
      - "automation/auto_footprint_cloud.py"
      - ".github/workflows/auto-footprint-cloud.yml"
  schedule:
    # 10:30 Ecuador time = 15:30 UTC
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  publish-footprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate public-safe footprint content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          FOOTPRINT_BLOCKED_TERMS: ${{ secrets.FOOTPRINT_BLOCKED_TERMS }}
        run: python automation/auto_footprint_cloud.py

      - name: Show generated files
        run: |
          echo "Generated files for manual review:"
          find docs posts social products portfolio automation/state -type f -maxdepth 3 2>/dev/null | sort || true

      - name: Upload generated draft for manual review
        uses: actions/upload-artifact@v4
        with:
          name: footprint-draft
          path: |
            docs/
            posts/
            social/
            products/
            portfolio/
            automation/state/
          if-no-files-found: error
